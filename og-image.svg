<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Board grid -->
  <g transform="translate(420, 90)">
    <rect x="0" y="0" width="360" height="360" rx="12" fill="#0f3460"/>
    <!-- 5x5 cells -->
    <g fill="#16213e">
      <rect x="6" y="6" width="66" height="66" rx="4"/>
      <rect x="78" y="6" width="66" height="66" rx="4"/>
      <rect x="150" y="6" width="66" height="66" rx="4"/>
      <rect x="222" y="6" width="66" height="66" rx="4"/>
      <rect x="294" y="6" width="66" height="66" rx="4"/>
      <rect x="6" y="78" width="66" height="66" rx="4"/>
      <rect x="78" y="78" width="66" height="66" rx="4"/>
      <rect x="150" y="78" width="66" height="66" rx="4"/>
      <rect x="222" y="78" width="66" height="66" rx="4"/>
      <rect x="294" y="78" width="66" height="66" rx="4"/>
      <rect x="6" y="150" width="66" height="66" rx="4"/>
      <rect x="78" y="150" width="66" height="66" rx="4"/>
      <rect x="150" y="150" width="66" height="66" rx="4"/>
      <rect x="222" y="150" width="66" height="66" rx="4"/>
      <rect x="294" y="150" width="66" height="66" rx="4"/>
      <rect x="6" y="222" width="66" height="66" rx="4"/>
      <rect x="78" y="222" width="66" height="66" rx="4"/>
      <rect x="150" y="222" width="66" height="66" rx="4"/>
      <rect x="222" y="222" width="66" height="66" rx="4"/>
      <rect x="294" y="222" width="66" height="66" rx="4"/>
      <rect x="6" y="294" width="66" height="66" rx="4"/>
      <rect x="78" y="294" width="66" height="66" rx="4"/>
      <rect x="150" y="294" width="66" height="66" rx="4"/>
      <rect x="222" y="294" width="66" height="66" rx="4"/>
      <rect x="294" y="294" width="66" height="66" rx="4"/>
    </g>
    <!-- Mountains in middle row -->
    <text x="111" y="200" font-size="36" text-anchor="middle" dominant-baseline="central">⛰️</text>
    <text x="183" y="200" font-size="36" text-anchor="middle" dominant-baseline="central">⛰️</text>
    <text x="255" y="200" font-size="36" text-anchor="middle" dominant-baseline="central">⛰️</text>
    <!-- Sample pieces -->
    <text x="39" y="344" font-size="32" text-anchor="middle" dominant-baseline="central">🐘</text>
    <text x="327" y="56" font-size="32" text-anchor="middle" dominant-baseline="central">🦏</text>
    <text x="111" y="344" font-size="32" text-anchor="middle" dominant-baseline="central">🐘</text>
    <text x="255" y="56" font-size="32" text-anchor="middle" dominant-baseline="central">🦏</text>
  </g>
  <!-- Title -->
  <text x="600" y="520" font-family="system-ui, sans-serif" font-size="64" font-weight="bold" fill="#eee" text-anchor="middle">Mountainfall</text>
  <text x="600" y="570" font-family="system-ui, sans-serif" font-size="24" fill="#aaa" text-anchor="middle">Elephants vs Rhinoceros — Push the Mountains</text>
  <!-- Side decorations -->
  <text x="200" y="270" font-size="64" text-anchor="middle" dominant-baseline="central">🐘</text>
  <text x="1000" y="270" font-size="64" text-anchor="middle" dominant-baseline="central">🦏</text>
